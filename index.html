<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>floof phone camera</title>
    <style>
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif;
        background: #111;
        color: #f4f7f8;
        display: grid;
        min-height: 100vh;
        place-items: center;
      }

      main {
        width: min(520px, calc(100vw - 32px));
        background: #171717;
        border: 1px solid #2b2b2b;
        border-radius: 14px;
        padding: 24px;
        box-sizing: border-box;
      }

      video {
        width: 100%;
        background: #050505;
        border-radius: 10px;
        margin: 12px 0;
      }

      button {
        appearance: none;
        border: 0;
        border-radius: 10px;
        background: #6aa7ff;
        color: #071017;
        font-size: 17px;
        font-weight: 700;
        padding: 14px 18px;
        width: 100%;
      }

      p {
        color: #aab2bd;
        line-height: 1.45;
      }

      code {
        display: block;
        white-space: normal;
        word-break: break-all;
        background: #0c1012;
        border: 1px solid #2b2b2b;
        border-radius: 8px;
        padding: 12px;
        color: #6aa7ff;
      }

      .ok {
        color: #58d68d;
        font-weight: 700;
      }

      .err {
        color: #ef4444;
      }

      .small {
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>floof</h1>
      <p>Start the camera to send preview frames to floof.</p>
      <video id="preview" autoplay muted playsinline></video>
      <button id="start">Start Camera</button>
      <p id="status" class="small">Waiting for camera permission.</p>
      <code id="session"></code>
    </main>

    <script>
      const params = new URLSearchParams(window.location.search);
      const session = params.get("session") || "manual";
      const video = document.getElementById("preview");
      const button = document.getElementById("start");
      const status = document.getElementById("status");
      const sessionLabel = document.getElementById("session");
      const canvas = document.createElement("canvas");
      const context = canvas.getContext("2d");
      let busy = false;

      sessionLabel.textContent = "Session: " + session;

      async function sendFrame() {
        if (!video.videoWidth || busy) {
          return;
        }

        busy = true;
        canvas.width = 640;
        canvas.height = Math.round(video.videoHeight * (640 / video.videoWidth));
        context.drawImage(video, 0, 0, canvas.width, canvas.height);

        canvas.toBlob(async (blob) => {
          try {
            const response = await fetch("/api/frame?session=" + encodeURIComponent(session), {
              method: "POST",
              headers: { "Content-Type": "image/jpeg" },
              body: blob
            });

            if (!response.ok) {
              throw new Error("relay returned " + response.status);
            }

            status.textContent = "Streaming to floof.";
            status.className = "small ok";
          } catch (error) {
            status.textContent = "Stream error: " + (error.message || error.name);
            status.className = "small err";
          }

          busy = false;
        }, "image/jpeg", 0.72);
      }

      button.onclick = async () => {
        try {
          const stream = await navigator.mediaDevices.getUserMedia({
            video: {
              facingMode: "environment",
              width: { ideal: 1280 },
              height: { ideal: 720 }
            },
            audio: false
          });

          video.srcObject = stream;
          button.textContent = "Streaming";
          setInterval(sendFrame, 200);
        } catch (error) {
          status.textContent = "Camera blocked: " + (error.message || error.name);
          status.className = "small err";
        }
      };
    </script>
  </body>
</html>
