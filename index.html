<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>floof phone camera</title>
    <style>
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif;
        background: #111;
        color: #f4f7f8;
        display: grid;
        min-height: 100vh;
        place-items: start center;
        padding: 16px 0 20px;
        box-sizing: border-box;
      }

      main {
        width: min(520px, calc(100vw - 24px));
        background: #171717;
        border: 1px solid #2b2b2b;
        border-radius: 14px;
        padding: 18px;
        box-sizing: border-box;
      }

      video {
        width: 100%;
        background: #050505;
        border-radius: 10px;
        margin: 8px 0;
      }

      button {
        appearance: none;
        border: 0;
        border-radius: 10px;
        background: #6aa7ff;
        color: #071017;
        font-size: 17px;
        font-weight: 700;
        padding: 14px 18px;
        width: 100%;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }

      button.secondary {
        background: #252c33;
        color: #f4f7f8;
      }

      button.toggle-on {
        background: #ffd166;
        color: #171100;
      }

      button:disabled,
      input:disabled,
      select:disabled {
        opacity: 0.55;
      }

      .controls {
        display: none;
        gap: 12px;
        margin: 8px 0;
      }


      .controls.visible {
        display: grid;
      }

      .control {
        display: grid;
        gap: 7px;
      }

      label {
        color: #d7dde3;
        font-size: 13px;
        font-weight: 700;
      }

      input,
      select {
        width: 100%;
        box-sizing: border-box;
        border: 1px solid #343d46;
        border-radius: 10px;
        background: #0c1012;
        color: #f4f7f8;
        font-size: 16px;
        min-height: 48px;
        padding: 10px 12px;
      }

      input[type="range"] {
        padding: 0;
        accent-color: #6aa7ff;
      }

      p {
        color: #aab2bd;
        line-height: 1.45;
      }

      code {
        display: block;
        white-space: normal;
        word-break: break-all;
        background: #0c1012;
        border: 1px solid #2b2b2b;
        border-radius: 8px;
        padding: 12px;
        color: #6aa7ff;
      }

      .ok {
        color: #58d68d;
        font-weight: 700;
      }

      .err {
        color: #ef4444;
      }

      .small {
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>floof</h1>
      <video id="preview" autoplay muted playsinline></video>
      <div id="controls" class="controls" aria-label="Camera controls">
        <button id="flip" class="secondary" type="button">Flip Camera</button>
        <div class="control">
          <label for="quality">Quality</label>
          <select id="quality">
            <option value="low">Low latency</option>
            <option value="720p" selected>720p</option>
            <option value="1080p">1080p</option>
          </select>
        </div>
        <div id="zoomWrap" class="control" hidden>
          <label for="zoom">Zoom</label>
          <input id="zoom" type="range" min="1" max="1" step="0.1" value="1" />
        </div>
        <button id="torch" class="secondary" type="button" hidden>Torch Off</button>
      </div>
      <button id="start">Start Camera</button>
      <p id="status" class="small">Waiting for camera permission.</p>
      <code id="session"></code>
    </main>

    <script>
      const params = new URLSearchParams(window.location.search);
      const session = params.get("session") || params.get("s") || "manual";
      const video = document.getElementById("preview");
      const button = document.getElementById("start");
      const status = document.getElementById("status");
      const sessionLabel = document.getElementById("session");
      const controls = document.getElementById("controls");
      const flipButton = document.getElementById("flip");
      const qualitySelect = document.getElementById("quality");
      const zoomWrap = document.getElementById("zoomWrap");
      const zoomSlider = document.getElementById("zoom");
      const torchButton = document.getElementById("torch");
      const iceServers = [{ urls: "stun:stun.l.google.com:19302" }];
      let peer = null;
      let localStream = null;
      let activeVideoTrack = null;
      let videoSender = null;
      let currentFacingMode = "environment";
      let currentQualityPreset = "720p";
      let torchEnabled = false;
      let pollTimer = null;
      let answerApplied = false;
      let offerPosted = false;
      let queuedCandidates = [];
      const addedDesktopCandidates = new Set();

      sessionLabel.textContent = "Session: " + session;

      function candidateKey(candidate) {
        return [
          candidate.candidate || "",
          candidate.sdpMid || "",
          candidate.sdpMLineIndex ?? ""
        ].join("|");
      }

      function setStatus(message, className) {
        status.textContent = message;
        status.className = className || "small";
      }

      function getQualityConstraints(preset) {
        if (preset === "low") {
          return {
            width: { ideal: 640 },
            height: { ideal: 360 },
            frameRate: { ideal: 24, max: 30 }
          };
        }

        if (preset === "1080p") {
          return {
            width: { ideal: 1920 },
            height: { ideal: 1080 },
            frameRate: { ideal: 30, max: 30 }
          };
        }

        return {
          width: { ideal: 1280 },
          height: { ideal: 720 },
          frameRate: { ideal: 30, max: 30 }
        };
      }

      function buildVideoConstraints() {
        const constraints = getQualityConstraints(currentQualityPreset);
        constraints.facingMode = { ideal: currentFacingMode };
        return constraints;
      }

      function stopStream(stream) {
        if (!stream) {
          return;
        }

        stream.getTracks().forEach((track) => track.stop());
      }

      function getTrackCapabilities(track) {
        if (!track || !track.getCapabilities) {
          return {};
        }

        try {
          return track.getCapabilities() || {};
        } catch (error) {
          return {};
        }
      }

      function getTrackSettings(track) {
        if (!track || !track.getSettings) {
          return {};
        }

        try {
          return track.getSettings() || {};
        } catch (error) {
          return {};
        }
      }

      function refreshCameraControls() {
        const capabilities = getTrackCapabilities(activeVideoTrack);
        const settings = getTrackSettings(activeVideoTrack);
        const zoom = capabilities.zoom;

        controls.className = activeVideoTrack ? "controls visible" : "controls";
        flipButton.disabled = !activeVideoTrack;
        qualitySelect.disabled = !activeVideoTrack;
        qualitySelect.value = currentQualityPreset;

        if (zoom && typeof zoom.min === "number" && typeof zoom.max === "number") {
          const step = typeof zoom.step === "number" && zoom.step > 0 ? zoom.step : 0.1;
          zoomSlider.min = zoom.min;
          zoomSlider.max = zoom.max;
          zoomSlider.step = step;
          zoomSlider.value = typeof settings.zoom === "number" ? settings.zoom : zoom.min;
          zoomSlider.disabled = false;
          zoomWrap.hidden = false;
        } else {
          zoomSlider.disabled = true;
          zoomWrap.hidden = true;
        }

        if (capabilities.torch === true) {
          torchButton.hidden = false;
          torchButton.disabled = false;
          torchButton.textContent = torchEnabled ? "Torch On" : "Torch Off";
          torchButton.className = torchEnabled ? "toggle-on" : "secondary";
        } else {
          torchEnabled = false;
          torchButton.hidden = true;
          torchButton.disabled = true;
          torchButton.textContent = "Torch Off";
          torchButton.className = "secondary";
        }
      }

      async function openCamera() {
        return navigator.mediaDevices.getUserMedia({
          video: buildVideoConstraints(),
          audio: false
        });
      }

      async function startOrRestartCamera(message) {
        const oldStream = localStream;
        let stream;

        try {
          stream = await openCamera();
        } catch (error) {
          setStatus("Camera setting failed: " + (error.message || error.name), "small err");
          throw error;
        }

        const newTrack = stream.getVideoTracks()[0];

        try {
          if (videoSender && newTrack) {
            await videoSender.replaceTrack(newTrack);
          }
        } catch (error) {
          stopStream(stream);
          setStatus("Camera setting failed: " + (error.message || error.name), "small err");
          throw error;
        }

        localStream = stream;
        activeVideoTrack = newTrack || null;
        torchEnabled = false;
        video.srcObject = stream;
        stopStream(oldStream);
        refreshCameraControls();

        if (message) {
          setStatus(message, "small ok");
        }

        return stream;
      }

      async function postSignal(payload) {
        const response = await fetch("/api/signal?session=" + encodeURIComponent(session), {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });

        if (!response.ok) {
          throw new Error("signal returned " + response.status);
        }

        return response.json();
      }

      async function getSignal() {
        const response = await fetch("/api/signal?session=" + encodeURIComponent(session) + "&t=" + Date.now(), {
          cache: "no-store"
        });

        if (!response.ok) {
          throw new Error("signal returned " + response.status);
        }

        return response.json();
      }

      async function sendCandidate(candidate) {
        const payload = {
          type: "candidate",
          role: "phone",
          candidate: candidate.toJSON ? candidate.toJSON() : candidate
        };

        if (!offerPosted) {
          queuedCandidates.push(payload);
          return;
        }

        await postSignal(payload);
      }

      async function flushQueuedCandidates() {
        const candidates = queuedCandidates;
        queuedCandidates = [];

        for (const candidate of candidates) {
          await postSignal(candidate);
        }
      }

      async function pollDesktopAnswer() {
        if (!peer) {
          return;
        }

        try {
          const state = await getSignal();

          if (state.answer && !answerApplied) {
            await peer.setRemoteDescription(state.answer);
            answerApplied = true;
            setStatus("WebRTC connected. Session: " + session, "small ok");
          }

          for (const candidate of state.desktopCandidates || []) {
            const key = candidateKey(candidate);

            if (!addedDesktopCandidates.has(key)) {
              addedDesktopCandidates.add(key);
              await peer.addIceCandidate(candidate);
            }
          }
        } catch (error) {
          setStatus("Signal error: " + (error.message || error.name), "small err");
        }
      }

      async function applyZoom() {
        if (!activeVideoTrack || !activeVideoTrack.applyConstraints) {
          return;
        }

        try {
          await activeVideoTrack.applyConstraints({
            advanced: [{ zoom: Number(zoomSlider.value) }]
          });
          setStatus("Zoom changed.", "small ok");
        } catch (error) {
          setStatus("Camera setting failed: " + (error.message || error.name), "small err");
          refreshCameraControls();
        }
      }

      async function toggleTorch() {
        const capabilities = getTrackCapabilities(activeVideoTrack);

        if (!activeVideoTrack || !activeVideoTrack.applyConstraints || capabilities.torch !== true) {
          setStatus("Torch is unsupported on this camera/browser.", "small");
          refreshCameraControls();
          return;
        }

        const nextTorch = !torchEnabled;

        try {
          await activeVideoTrack.applyConstraints({
            advanced: [{ torch: nextTorch }]
          });
          torchEnabled = nextTorch;
          refreshCameraControls();
          setStatus(torchEnabled ? "Torch enabled." : "Torch disabled.", "small ok");
        } catch (error) {
          setStatus("Camera setting failed: " + (error.message || error.name), "small err");
          refreshCameraControls();
        }
      }

      flipButton.onclick = async () => {
        if (!activeVideoTrack) {
          return;
        }

        const previousFacingMode = currentFacingMode;
        flipButton.disabled = true;
        currentFacingMode = currentFacingMode === "environment" ? "user" : "environment";

        try {
          await startOrRestartCamera("Camera flipped.");
        } catch (error) {
          currentFacingMode = previousFacingMode;
          try {
            await startOrRestartCamera("Camera restored.");
          } catch (restoreError) {
            setStatus("Camera setting failed: " + (restoreError.message || restoreError.name), "small err");
          }
        } finally {
          refreshCameraControls();
        }
      };

      qualitySelect.onchange = async () => {
        if (!activeVideoTrack) {
          return;
        }

        const previousPreset = currentQualityPreset;
        currentQualityPreset = qualitySelect.value;
        qualitySelect.disabled = true;

        try {
          await startOrRestartCamera("Quality changed.");
        } catch (error) {
          currentQualityPreset = previousPreset;
          qualitySelect.value = previousPreset;
          try {
            await startOrRestartCamera("Quality restored.");
          } catch (restoreError) {
            setStatus("Camera setting failed: " + (restoreError.message || restoreError.name), "small err");
          }
        } finally {
          refreshCameraControls();
        }
      };

      zoomSlider.oninput = () => {
        window.clearTimeout(zoomSlider.applyTimer);
        zoomSlider.applyTimer = window.setTimeout(applyZoom, 120);
      };

      torchButton.onclick = toggleTorch;

      button.onclick = async () => {
        try {
          button.disabled = true;
          button.textContent = "Starting";
          setStatus("Opening camera.", "small");

          const stream = await startOrRestartCamera();

          peer = new RTCPeerConnection({ iceServers });
          peer.oniceconnectionstatechange = () => {
            setStatus(
              "WebRTC " + peer.iceConnectionState + ". Session: " + session,
              peer.iceConnectionState === "connected" || peer.iceConnectionState === "completed"
              ? "small ok"
              : "small"
            );
          };
          peer.onicecandidate = (event) => {
            if (event.candidate) {
              sendCandidate(event.candidate).catch((error) => {
                setStatus("Candidate error: " + (error.message || error.name), "small err");
              });
            }
          };

          for (const track of stream.getTracks()) {
            const sender = peer.addTrack(track, stream);

            if (track.kind === "video") {
              videoSender = sender;
            }
          }

          const offer = await peer.createOffer();
          await peer.setLocalDescription(offer);
          await postSignal({
            type: "offer",
            role: "phone",
            description: peer.localDescription
          });

          offerPosted = true;
          await flushQueuedCandidates();

          button.textContent = "Streaming";
          setStatus("Waiting for desktop receiver. Session: " + session, "small");

          if (!pollTimer) {
            pollTimer = setInterval(pollDesktopAnswer, 700);
          }
        } catch (error) {
          button.disabled = false;
          button.textContent = "Start Camera";
          setStatus("Camera/WebRTC error: " + (error.message || error.name), "small err");
        }
      };
    </script>
  </body>
</html>
