<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>floof phone camera</title>
    <style>
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif;
        background: #111;
        color: #f4f7f8;
        display: grid;
        place-items: center;
        min-height: 100vh;
      }

      main {
        width: min(520px, calc(100vw - 32px));
        background: #171717;
        border: 1px solid #2b2b2b;
        border-radius: 14px;
        padding: 24px;
        box-sizing: border-box;
      }

      video {
        width: 100%;
        background: #050505;
        border-radius: 10px;
      }

      button {
        margin-top: 14px;
        width: 100%;
        border: 0;
        border-radius: 10px;
        background: #6aa7ff;
        color: #071017;
        font-size: 17px;
        font-weight: 700;
        padding: 14px 18px;
      }

      p {
        color: #aab2bd;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>floof</h1>
      <p>Test iPhone camera access over HTTPS.</p>
      <video id="preview" autoplay muted playsinline></video>
      <button id="start">Start Camera</button>
      <p id="status">Waiting.</p>
    </main>

    <script>
      const video = document.getElementById("preview");
      const button = document.getElementById("start");
      const status = document.getElementById("status");

      button.onclick = async () => {
        try {
          const stream = await navigator.mediaDevices.getUserMedia({
            video: {
              facingMode: "environment",
              width: { ideal: 1280 },
              height: { ideal: 720 }
            },
            audio: false
          });

          video.srcObject = stream;
          status.textContent = "Camera is working.";
          button.textContent = "Camera Started";
        } catch (error) {
          status.textContent = "Camera failed: " + (error.message || error.name);
        }
      };
    </script>
  </body>
</html>
