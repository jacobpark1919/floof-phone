<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>floof WebRTC receiver</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        background: #111;
        color: #f4f7f8;
        font-family: -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif;
        display: grid;
        place-items: start center;
        padding: 16px 0 20px;
        box-sizing: border-box;
      }

      main {
        width: min(960px, calc(100vw - 24px));
      }

      video {
        width: 100%;
        aspect-ratio: 16 / 9;
        background: #050505;
        border: 1px solid #2b2b2b;
        border-radius: 12px;
        display: block;
      }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 10px;
      }

      h1 {
        font-size: 20px;
        margin: 0;
      }

      button {
        appearance: none;
        border: 0;
        border-radius: 10px;
        background: #6aa7ff;
        color: #071017;
        font-size: 15px;
        font-weight: 700;
        padding: 11px 16px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }


      p {
        color: #aab2bd;
        line-height: 1.45;
      }

      code {
        color: #6aa7ff;
      }

      .ok {
        color: #58d68d;
        font-weight: 700;
      }

      .err {
        color: #ef4444;
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>floof WebRTC receiver</h1>
        <button id="start">Start Receiver</button>
      </header>
      <video id="remote" autoplay muted playsinline controls></video>
      <p id="status">Waiting. Session: <code id="session"></code></p>
    </main>

    <script>
      const params = new URLSearchParams(window.location.search);
      const session = params.get("session") || params.get("s") || "manual";
      const embed = params.get("embed") === "1";
      const autoStart = params.get("auto") === "1";
      const remote = document.getElementById("remote");
      const button = document.getElementById("start");
      const status = document.getElementById("status");
      const sessionLabel = document.getElementById("session");
      const iceServers = [{ urls: "stun:stun.l.google.com:19302" }];
      let peer = null;
      let offerApplied = false;
      let answerPosted = false;
      let queuedCandidates = [];
      let remoteStream = null;
      let mediaRecorder = null;
      let recorderStopRequested = false;
      let recorderStopGraceTimer = null;
      let pendingChunkReads = 0;
      let recorderBytesSent = 0;
      let activeFloofRecordingTakeId = null;
      const addedPhoneCandidates = new Set();

      sessionLabel.textContent = session;

      if (embed) {
        document.body.style.placeItems = "stretch";
        document.querySelector("main").style.width = "100%";
        document.querySelector("main").style.minHeight = "100vh";
        document.querySelector("main").style.display = "grid";
        document.querySelector("main").style.gridTemplateRows = "auto 1fr auto";
        document.querySelector("main").style.padding = "0";
        document.querySelector("header").style.padding = "10px";
        document.querySelector("header").style.marginBottom = "0";
        remote.style.borderRadius = "0";
        remote.style.borderLeft = "0";
        remote.style.borderRight = "0";
        status.style.padding = "0 10px 10px";
      }

      function setStatus(message, kind = "") {
        status.textContent = message + " Session: " + session;
        status.className = kind;
      }

      function emitToFloof(payload) {
        if (payload && activeFloofRecordingTakeId !== null && payload.takeId === undefined) {
          payload.takeId = activeFloofRecordingTakeId;
        }

        if (window.__JUCE__ && window.__JUCE__.backend) {
          window.__JUCE__.backend.emitEvent("floofWebRtcVideo", payload);
        }
      }

      function normaliseTimestampMs(value) {
        if (typeof value !== "number" || !Number.isFinite(value)) {
          return null;
        }

        return value > 100000000000 ? value - performance.timeOrigin : value;
      }

      function validDurationMs(value) {
        return typeof value === "number" && Number.isFinite(value) && value >= 0 && value <= 2000;
      }

      function emitFrameTiming(metadata) {
        const presentationMs = normaliseTimestampMs(metadata && metadata.presentationTime);
        const captureMs = normaliseTimestampMs(metadata && metadata.captureTime);
        const receiveMs = normaliseTimestampMs(metadata && metadata.receiveTime);
        const captureToPresentMs = presentationMs !== null && captureMs !== null
          ? presentationMs - captureMs
          : null;
        const receiveToPresentMs = presentationMs !== null && receiveMs !== null
          ? presentationMs - receiveMs
          : null;
        let videoLatencyMs = validDurationMs(captureToPresentMs) ? captureToPresentMs : null;

        if (videoLatencyMs === null && validDurationMs(receiveToPresentMs)) {
          videoLatencyMs = receiveToPresentMs;
        }

        if (videoLatencyMs === null) {
          return;
        }

        emitToFloof({
          type: "timing",
          source: "requestVideoFrameCallback",
          videoLatencyMs,
          captureToPresentMs,
          receiveToPresentMs,
          mediaTimeSeconds: typeof metadata.mediaTime === "number" ? metadata.mediaTime : null,
          presentedFrames: typeof metadata.presentedFrames === "number" ? metadata.presentedFrames : null
        });
      }

      function samplePhoneSyncFrames() {
        if (!remote || typeof remote.requestVideoFrameCallback !== "function") {
          emitToFloof({
            type: "timingUnavailable",
            reason: !remote ? "video element not found" : "requestVideoFrameCallback unavailable"
          });
          return;
        }

        let samplesRemaining = 24;
        const onFrame = (_now, metadata) => {
          emitFrameTiming(metadata || {});
          samplesRemaining -= 1;

          if (samplesRemaining > 0) {
            remote.requestVideoFrameCallback(onFrame);
          }
        };

        remote.requestVideoFrameCallback(onFrame);
      }

      function getRecorderMimeType() {
        const candidates = [
          "video/webm;codecs=vp9",
          "video/webm;codecs=vp8",
          "video/webm"
        ];

        for (const mimeType of candidates) {
          if (window.MediaRecorder && MediaRecorder.isTypeSupported(mimeType)) {
            return mimeType;
          }
        }

        return "";
      }

      function maybeEmitRecorderStopped() {
        if (!recorderStopRequested || pendingChunkReads > 0) {
          return;
        }

        if (recorderStopGraceTimer) {
          return;
        }

        recorderStopRequested = false;
        mediaRecorder = null;
        setStatus("WebRTC video saved.", "ok");
        emitToFloof({ type: "stopped", bytes: recorderBytesSent });
        activeFloofRecordingTakeId = null;
      }

      function scheduleRecorderStopped() {
        if (recorderStopGraceTimer) {
          clearTimeout(recorderStopGraceTimer);
        }

        recorderStopGraceTimer = setTimeout(() => {
          recorderStopGraceTimer = null;
          maybeEmitRecorderStopped();
        }, 750);
      }

      function getActiveRemoteStream() {
        if (remoteStream) {
          return remoteStream;
        }

        if (remote.srcObject instanceof MediaStream) {
          return remote.srcObject;
        }

        return null;
      }

      window.floofStartWebRtcRecording = (takeId = null) => {
        try {
          const numericTakeId = Number(takeId);
          activeFloofRecordingTakeId = Number.isFinite(numericTakeId) && numericTakeId > 0
            ? numericTakeId
            : null;

          const streamToRecord = getActiveRemoteStream();

          if (!streamToRecord) {
            throw new Error("No WebRTC stream is connected yet");
          }

          if (!window.MediaRecorder) {
            throw new Error("MediaRecorder is not available in this WebView");
          }

          if (mediaRecorder && mediaRecorder.state !== "inactive") {
            return;
          }

          const liveVideoTracks = streamToRecord
            .getVideoTracks()
            .filter((track) => track.readyState === "live");

          if (liveVideoTracks.length === 0) {
            throw new Error("The connected phone stream has no live video track");
          }

          const mimeType = getRecorderMimeType();
          mediaRecorder = mimeType
            ? new MediaRecorder(streamToRecord, { mimeType })
            : new MediaRecorder(streamToRecord);
          recorderStopRequested = false;
          if (recorderStopGraceTimer) {
            clearTimeout(recorderStopGraceTimer);
            recorderStopGraceTimer = null;
          }
          pendingChunkReads = 0;
          recorderBytesSent = 0;
          samplePhoneSyncFrames();

          mediaRecorder.ondataavailable = (event) => {
            if (!event.data || event.data.size === 0) {
              return;
            }

            recorderBytesSent += event.data.size;
            pendingChunkReads += 1;
            const reader = new FileReader();
            reader.onload = () => {
              const result = String(reader.result || "");
              const commaIndex = result.indexOf(",");
              emitToFloof({
                type: "chunk",
                data: commaIndex >= 0 ? result.slice(commaIndex + 1) : result
              });
              pendingChunkReads -= 1;
              maybeEmitRecorderStopped();
            };
            reader.onerror = () => {
              pendingChunkReads -= 1;
              emitToFloof({
                type: "error",
                message: "Could not read WebRTC recording chunk"
              });
              maybeEmitRecorderStopped();
            };
            reader.readAsDataURL(event.data);
          };

          mediaRecorder.onstop = () => {
            recorderStopRequested = true;
            setStatus("Finishing WebRTC video.", "ok");
            scheduleRecorderStopped();
          };

          mediaRecorder.onerror = (event) => {
            recorderStopRequested = false;
            if (recorderStopGraceTimer) {
              clearTimeout(recorderStopGraceTimer);
              recorderStopGraceTimer = null;
            }
            mediaRecorder = null;
            emitToFloof({
              type: "error",
              message: event.error ? event.error.message : "MediaRecorder error"
            });
            activeFloofRecordingTakeId = null;
          };

          mediaRecorder.start(1000);
          setStatus("Recording WebRTC video.", "ok");
          emitToFloof({ type: "started" });
          setTimeout(samplePhoneSyncFrames, 120);
          setTimeout(samplePhoneSyncFrames, 600);
        } catch (error) {
          emitToFloof({
            type: "error",
            message: error.message || error.name
          });
          activeFloofRecordingTakeId = null;
        }
      };

      window.floofStopWebRtcRecording = () => {
        try {
          if (!mediaRecorder || mediaRecorder.state === "inactive") {
            recorderStopRequested = false;
            emitToFloof({ type: "stopped", bytes: recorderBytesSent });
            activeFloofRecordingTakeId = null;
            return;
          }

          mediaRecorder.requestData();
          mediaRecorder.stop();
        } catch (error) {
          emitToFloof({
            type: "error",
            message: error.message || error.name
          });
          activeFloofRecordingTakeId = null;
        }
      };

      function candidateKey(candidate) {
        return [
          candidate.candidate || "",
          candidate.sdpMid || "",
          candidate.sdpMLineIndex ?? ""
        ].join("|");
      }

      async function postSignal(payload) {
        const response = await fetch("/api/signal?session=" + encodeURIComponent(session), {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });

        if (!response.ok) {
          throw new Error("signal returned " + response.status);
        }

        return response.json();
      }

      async function getSignal() {
        const response = await fetch("/api/signal?session=" + encodeURIComponent(session) + "&t=" + Date.now(), {
          cache: "no-store"
        });

        if (!response.ok) {
          throw new Error("signal returned " + response.status);
        }

        return response.json();
      }

      async function sendCandidate(candidate) {
        const payload = {
          type: "candidate",
          role: "desktop",
          candidate: candidate.toJSON ? candidate.toJSON() : candidate
        };

        if (!answerPosted) {
          queuedCandidates.push(payload);
          return;
        }

        await postSignal(payload);
      }

      async function flushQueuedCandidates() {
        const candidates = queuedCandidates;
        queuedCandidates = [];

        for (const candidate of candidates) {
          await postSignal(candidate);
        }
      }

      async function pollPhoneOffer() {
        if (!peer) {
          return;
        }

        try {
          const state = await getSignal();

          if (state.offer && !offerApplied) {
            await peer.setRemoteDescription(state.offer);
            offerApplied = true;

            const answer = await peer.createAnswer();
            await peer.setLocalDescription(answer);
            await postSignal({
              type: "answer",
              role: "desktop",
              description: peer.localDescription
            });

            answerPosted = true;
            await flushQueuedCandidates();
            setStatus("Answer sent. Connecting.");
          }

          for (const candidate of state.phoneCandidates || []) {
            const key = candidateKey(candidate);

            if (!addedPhoneCandidates.has(key)) {
              addedPhoneCandidates.add(key);
              await peer.addIceCandidate(candidate);
            }
          }
        } catch (error) {
          setStatus("Signal error: " + (error.message || error.name), "err");
        }
      }

      button.onclick = async () => {
        try {
          button.disabled = true;
          button.textContent = "Receiver Running";
          setStatus("Waiting for phone offer.");

          peer = new RTCPeerConnection({ iceServers });
          peer.ontrack = (event) => {
            if (event.streams && event.streams[0]) {
              remoteStream = event.streams[0];
              remote.srcObject = remoteStream;
            } else {
              remoteStream = new MediaStream([event.track]);
              remote.srcObject = remoteStream;
            }
          };
          peer.oniceconnectionstatechange = () => {
            const state = peer.iceConnectionState;
            const connected = state === "connected" || state === "completed";
            setStatus("WebRTC " + state + ".", connected ? "ok" : "");
          };
          peer.onicecandidate = (event) => {
            if (event.candidate) {
              sendCandidate(event.candidate).catch((error) => {
                setStatus("Candidate error: " + (error.message || error.name), "err");
              });
            }
          };

          setInterval(pollPhoneOffer, 700);
          pollPhoneOffer();
        } catch (error) {
          button.disabled = false;
          button.textContent = "Start Receiver";
          setStatus("Receiver error: " + (error.message || error.name), "err");
        }
      };

      if (autoStart) {
        window.addEventListener("load", () => {
          setTimeout(() => button.click(), 250);
        });
      }
    </script>
  </body>
</html>
