<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>floof WebRTC receiver</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        background: #111;
        color: #f4f7f8;
        font-family: -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif;
        display: grid;
        place-items: center;
      }

      main {
        width: min(960px, calc(100vw - 32px));
      }

      video {
        width: 100%;
        aspect-ratio: 16 / 9;
        background: #050505;
        border: 1px solid #2b2b2b;
        border-radius: 12px;
        display: block;
      }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 14px;
      }

      h1 {
        font-size: 20px;
        margin: 0;
      }

      button {
        appearance: none;
        border: 0;
        border-radius: 10px;
        background: #6aa7ff;
        color: #071017;
        font-size: 15px;
        font-weight: 700;
        padding: 11px 16px;
      }

      p {
        color: #aab2bd;
        line-height: 1.45;
      }

      code {
        color: #6aa7ff;
      }

      .ok {
        color: #58d68d;
        font-weight: 700;
      }

      .err {
        color: #ef4444;
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>floof WebRTC receiver</h1>
        <button id="start">Start Receiver</button>
      </header>
      <video id="remote" autoplay muted playsinline controls></video>
      <p id="status">Waiting. Session: <code id="session"></code></p>
    </main>

    <script>
      const params = new URLSearchParams(window.location.search);
      const session = params.get("session") || params.get("s") || "manual";
      const remote = document.getElementById("remote");
      const button = document.getElementById("start");
      const status = document.getElementById("status");
      const sessionLabel = document.getElementById("session");
      const iceServers = [{ urls: "stun:stun.l.google.com:19302" }];
      let peer = null;
      let offerApplied = false;
      let answerPosted = false;
      let queuedCandidates = [];
      const addedPhoneCandidates = new Set();

      sessionLabel.textContent = session;

      function setStatus(message, kind = "") {
        status.textContent = message + " Session: " + session;
        status.className = kind;
      }

      function candidateKey(candidate) {
        return [
          candidate.candidate || "",
          candidate.sdpMid || "",
          candidate.sdpMLineIndex ?? ""
        ].join("|");
      }

      async function postSignal(payload) {
        const response = await fetch("/api/signal?session=" + encodeURIComponent(session), {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });

        if (!response.ok) {
          throw new Error("signal returned " + response.status);
        }

        return response.json();
      }

      async function getSignal() {
        const response = await fetch("/api/signal?session=" + encodeURIComponent(session) + "&t=" + Date.now(), {
          cache: "no-store"
        });

        if (!response.ok) {
          throw new Error("signal returned " + response.status);
        }

        return response.json();
      }

      async function sendCandidate(candidate) {
        const payload = {
          type: "candidate",
          role: "desktop",
          candidate: candidate.toJSON ? candidate.toJSON() : candidate
        };

        if (!answerPosted) {
          queuedCandidates.push(payload);
          return;
        }

        await postSignal(payload);
      }

      async function flushQueuedCandidates() {
        const candidates = queuedCandidates;
        queuedCandidates = [];

        for (const candidate of candidates) {
          await postSignal(candidate);
        }
      }

      async function pollPhoneOffer() {
        if (!peer) {
          return;
        }

        try {
          const state = await getSignal();

          if (state.offer && !offerApplied) {
            await peer.setRemoteDescription(state.offer);
            offerApplied = true;

            const answer = await peer.createAnswer();
            await peer.setLocalDescription(answer);
            await postSignal({
              type: "answer",
              role: "desktop",
              description: peer.localDescription
            });

            answerPosted = true;
            await flushQueuedCandidates();
            setStatus("Answer sent. Connecting.");
          }

          for (const candidate of state.phoneCandidates || []) {
            const key = candidateKey(candidate);

            if (!addedPhoneCandidates.has(key)) {
              addedPhoneCandidates.add(key);
              await peer.addIceCandidate(candidate);
            }
          }
        } catch (error) {
          setStatus("Signal error: " + (error.message || error.name), "err");
        }
      }

      button.onclick = async () => {
        try {
          button.disabled = true;
          button.textContent = "Receiver Running";
          setStatus("Waiting for phone offer.");

          peer = new RTCPeerConnection({ iceServers });
          peer.ontrack = (event) => {
            if (event.streams && event.streams[0]) {
              remote.srcObject = event.streams[0];
            } else {
              remote.srcObject = new MediaStream([event.track]);
            }
          };
          peer.oniceconnectionstatechange = () => {
            const state = peer.iceConnectionState;
            const connected = state === "connected" || state === "completed";
            setStatus("WebRTC " + state + ".", connected ? "ok" : "");
          };
          peer.onicecandidate = (event) => {
            if (event.candidate) {
              sendCandidate(event.candidate).catch((error) => {
                setStatus("Candidate error: " + (error.message || error.name), "err");
              });
            }
          };

          setInterval(pollPhoneOffer, 700);
          pollPhoneOffer();
        } catch (error) {
          button.disabled = false;
          button.textContent = "Start Receiver";
          setStatus("Receiver error: " + (error.message || error.name), "err");
        }
      };
    </script>
  </body>
</html>
